name: CD - Deploy Production

on:
  push:
    branches: ["main"]
  workflow_dispatch:        # Cho phép chạy thủ công trên GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/quanlychitieu-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/quanlychitieu-frontend

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build & Push Docker images lên ghcr.io
  # ─────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # Cần để push lên ghcr.io

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.IMAGE_BACKEND }}
            ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      # ── Backend ──
      - name: Build & Push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:sha-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_BACKEND }}:latest
          cache-to: type=inline

      # ── Frontend ──
      - name: Build & Push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:sha-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_FRONTEND }}:latest
          cache-to: type=inline

  # ─────────────────────────────────────────────
  # JOB 2: SSH vào VPS, pull images mới & restart
  # ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production   # Bảo vệ bằng GitHub Environment (optional)

    steps:
      - name: Checkout code (lấy docker-compose.yml)
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e

            # ── Tới thư mục dự án trên VPS ──
            cd ${{ secrets.VPS_PROJECT_PATH }}

            # ── Pull code mới nhất (docker-compose.yml) ──
            git pull origin main

            # ── Đăng nhập ghcr.io để pull images private ──
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # ── Pull images mới build xong ──
            docker pull ${{ env.IMAGE_BACKEND }}:latest
            docker pull ${{ env.IMAGE_FRONTEND }}:latest

            # ── Restart với zero-downtime (backend trước, frontend sau) ──
            docker compose up -d --no-build --force-recreate

            # ── Dọn images cũ (tiết kiệm disk VPS) ──
            docker image prune -f

            echo "✅ Deploy thành công! Commit: ${{ github.sha }}"

      - name: Health check sau deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            # Chờ backend healthy (tối đa 60 giây)
            for i in $(seq 1 12); do
              STATUS=$(curl -sf http://localhost:5000/api/health && echo "OK" || echo "FAIL")
              if [ "$STATUS" = "OK" ]; then
                echo "✅ Health check passed!"
                exit 0
              fi
              echo "⏳ Chờ backend... ($i/12)"
              sleep 5
            done
            echo "❌ Health check thất bại sau 60 giây."
            exit 1
