name: CD - Deploy Production

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────────
  # JOB 1: Deploy Backend lên Render (qua Deploy Hook)
  # ──────────────────────────────────────────────────────
  deploy-backend:
    name: 🚀 Deploy Backend → Render
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/render_resp.json -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")

          cat /tmp/render_resp.json
          echo ""

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✅ Render deploy triggered (HTTP $HTTP_STATUS)"
          else
            echo "❌ Render deploy failed (HTTP $HTTP_STATUS)"
            exit 1
          fi

  # ──────────────────────────────────────────────────────
  # JOB 2: Deploy Frontend lên Vercel
  # ──────────────────────────────────────────────────────
  deploy-frontend:
    name: 🌐 Deploy Frontend → Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Build & deploy lên Vercel Production
      # VITE_API_URL phải trỏ đến Render backend URL (không dùng /api nữa)
      - name: Deploy to Vercel
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          # Pull Vercel project settings
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN

          # Build (VITE_API_URL đã set sẵn trong Vercel project settings)
          vercel build --prod --token=$VERCEL_TOKEN

          # Deploy artifacts đã build
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

  # ──────────────────────────────────────────────────────
  # JOB 3: Health Check sau khi cả 2 deploy xong
  # ──────────────────────────────────────────────────────
  health-check:
    name: ✅ Health Check
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]

    steps:
      - name: Wait for Render to be ready
        run: |
          echo "⏳ Chờ Render khởi động (tối đa 120s)..."
          BACKEND_URL="${{ secrets.RENDER_BACKEND_URL }}"

          for i in $(seq 1 24); do
            STATUS=$(curl -sf "${BACKEND_URL}/api/health" \
              -o /dev/null -w "%{http_code}" || echo "000")

            if [ "$STATUS" = "200" ]; then
              echo "✅ Backend healthy! (HTTP $STATUS)"
              exit 0
            fi

            echo "⏳ Attempt $i/24 — HTTP $STATUS. Retry sau 5s..."
            sleep 5
          done

          echo "❌ Health check thất bại sau 120 giây."
          exit 1
