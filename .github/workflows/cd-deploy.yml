name: CD - Deploy Production

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────────
  # JOB 1: Deploy Backend lên Render (qua Deploy Hook)
  # ──────────────────────────────────────────────────────
  deploy-backend:
    name: 🚀 Deploy Backend → Render
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/render_resp.json -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")

          cat /tmp/render_resp.json
          echo ""

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✅ Render deploy triggered (HTTP $HTTP_STATUS)"
          else
            echo "❌ Render deploy failed (HTTP $HTTP_STATUS)"
            exit 1
          fi

  # ──────────────────────────────────────────────────────
  # NOTE: Frontend (Vercel) tự động deploy qua GitHub
  # integration — không cần job riêng ở đây.
  # Vercel detect push lên main và build tự động.
  # ──────────────────────────────────────────────────────

  # ──────────────────────────────────────────────────────
  # JOB 2: Health Check Backend sau deploy
  # ──────────────────────────────────────────────────────
  health-check:
    name: ✅ Health Check Backend
    runs-on: ubuntu-latest
    needs: [deploy-backend]

    steps:
      - name: Wait for Render to be ready
        run: |
          echo "⏳ Chờ Render khởi động (tối đa 120s)..."
          BACKEND_URL="${{ secrets.RENDER_BACKEND_URL }}"

          for i in $(seq 1 24); do
            STATUS=$(curl -sf "${BACKEND_URL}/api/health" \
              -o /dev/null -w "%{http_code}" || echo "000")

            if [ "$STATUS" = "200" ]; then
              echo "✅ Backend healthy! (HTTP $STATUS)"
              exit 0
            fi

            echo "⏳ Attempt $i/24 — HTTP $STATUS. Retry sau 5s..."
            sleep 5
          done

          echo "❌ Health check thất bại sau 120 giây."
          exit 1
